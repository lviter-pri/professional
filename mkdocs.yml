site_name: 技术无止境-能解决问题才是时代所需
site_url: https://lviter-pri.github.io/professional/
repo_url: https://github.com/lviter-pri/professional
repo_name: lviter-pri/professional

theme:
  name: material
  palette:
    # 浅色模式：采用清晰的深蓝色系
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep blue
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: 切换深色模式
    # 深色模式：采用更沉稳的 slate 结合高亮蓝
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切换浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.tracking # 自动更新 URL 哈希，增加专业感
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tooltips # 鼠标悬停显示工具提示

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition # 原生提示框，非常推荐使用
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: ["en", "zh"]
  - mkdocstrings:
      default_handler: python

docs_dir: docs